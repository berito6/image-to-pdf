<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="照片轉PDF">
<title>照片轉PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--radius:18px;--safe-bottom:env(safe-area-inset-bottom,0px);--tr:0.25s ease}

[data-theme="dark"]{
  --bg:#141318;--surface:#1e1c24;--surface2:#2a2733;
  --border:rgba(255,255,255,0.07);--text:#f0eef8;--text2:rgba(240,238,248,0.42);
  --accent:#b69df8;--accent-dim:rgba(182,157,248,0.15);
  --hbg:rgba(182,157,248,0.08);--bbg:rgba(20,19,24,0.96);
  --badge:rgba(0,0,0,0.6);--tog:#35323f;--btn-text:#141318;
}
[data-theme="light"]{
  --bg:#f7f5ff;--surface:#fff;--surface2:#ede9ff;
  --border:rgba(100,80,180,0.1);--text:#1e1a2e;--text2:rgba(30,26,46,0.42);
  --accent:#7c5cbf;--accent-dim:rgba(124,92,191,0.1);
  --hbg:rgba(124,92,191,0.07);--bbg:rgba(247,245,255,0.96);
  --badge:rgba(0,0,0,0.45);--tog:#cdc5e8;--btn-text:#fff;
}
[data-theme="warm"]{
  --bg:#1c1410;--surface:#261e17;--surface2:#332820;
  --border:rgba(255,200,140,0.08);--text:#f5e8d8;--text2:rgba(245,232,216,0.4);
  --accent:#e8a96a;--accent-dim:rgba(232,169,106,0.13);
  --hbg:rgba(232,169,106,0.08);--bbg:rgba(28,20,16,0.96);
  --badge:rgba(0,0,0,0.6);--tog:#3d2e22;--btn-text:#1c1410;
}
[data-theme="sage"]{
  --bg:#111a15;--surface:#172119;--surface2:#1f2e22;
  --border:rgba(140,220,160,0.08);--text:#e2f0e6;--text2:rgba(226,240,230,0.4);
  --accent:#7ec89a;--accent-dim:rgba(126,200,154,0.12);
  --hbg:rgba(126,200,154,0.08);--bbg:rgba(17,26,21,0.96);
  --badge:rgba(0,0,0,0.6);--tog:#253429;--btn-text:#111a15;
}

body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;transition:background var(--tr),color var(--tr)}

header{padding:54px 22px 16px;background:var(--hbg);border-bottom:0.5px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:12px;transition:background var(--tr)}
.header-left{display:flex;align-items:center;gap:12px}
.app-icon{width:42px;height:42px;background:var(--accent);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:background var(--tr)}
.app-title{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:var(--text)}
.subtitle{font-size:12px;color:var(--text2);margin-top:2px;font-weight:300}

.theme-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:7px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all var(--tr)}
.theme-btn:active{transform:scale(0.95)}
.theme-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);transition:background var(--tr)}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(6px)}
.sheet-overlay.open{opacity:1;pointer-events:all}
.theme-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:22px 22px 0 0;padding:10px 16px calc(20px + var(--safe-bottom));z-index:51;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1),background var(--tr);border-top:0.5px solid var(--border)}
.theme-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sheet-title{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;padding:0 2px}
.theme-options{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.theme-option{border-radius:14px;padding:13px;cursor:pointer;border:1.5px solid transparent;transition:all 0.18s;position:relative}
.theme-option:active{transform:scale(0.97)}
.theme-option.active{border-color:var(--accent)}
.theme-option[data-t="dark"]{background:#1e1c24}
.theme-option[data-t="light"]{background:#f7f5ff;border-color:rgba(100,80,180,0.15)}
.theme-option[data-t="light"].active{border-color:#7c5cbf}
.theme-option[data-t="warm"]{background:#261e17}
.theme-option[data-t="sage"]{background:#172119}
.theme-preview{display:flex;gap:4px;margin-bottom:9px}
.theme-preview span{height:7px;border-radius:3px;flex:1}
.theme-option[data-t="dark"] .p1{background:#b69df8}.theme-option[data-t="dark"] .p2{background:#2a2733}.theme-option[data-t="dark"] .p3{background:#35323f}
.theme-option[data-t="light"] .p1{background:#7c5cbf}.theme-option[data-t="light"] .p2{background:#ede9ff}.theme-option[data-t="light"] .p3{background:#cdc5e8}
.theme-option[data-t="warm"] .p1{background:#e8a96a}.theme-option[data-t="warm"] .p2{background:#332820}.theme-option[data-t="warm"] .p3{background:#3d2e22}
.theme-option[data-t="sage"] .p1{background:#7ec89a}.theme-option[data-t="sage"] .p2{background:#1f2e22}.theme-option[data-t="sage"] .p3{background:#253429}
.theme-name{font-size:13px;font-weight:500}
.theme-option[data-t="dark"] .theme-name{color:#f0eef8}
.theme-option[data-t="light"] .theme-name{color:#1e1a2e}
.theme-option[data-t="warm"] .theme-name{color:#f5e8d8}
.theme-option[data-t="sage"] .theme-name{color:#e2f0e6}
.theme-check{position:absolute;top:10px;right:10px;width:17px;height:17px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:var(--btn-text)}
.theme-option.active .theme-check{display:flex}

main{flex:1;padding:18px 14px;display:flex;flex-direction:column;gap:14px}

.drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:38px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface)}
.drop-zone:active,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-dim)}
.drop-icon{font-size:40px;margin-bottom:12px;display:block}
.drop-title{font-size:15px;font-weight:500;margin-bottom:5px;color:var(--text)}
.drop-hint{font-size:12px;color:var(--text2);line-height:1.7}
.pick-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:var(--accent);color:var(--btn-text);border:none;border-radius:22px;padding:9px 20px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all 0.15s}
.pick-btn:active{transform:scale(0.96);filter:brightness(0.9)}
input[type="file"]{display:none}

.section-label{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding:0 2px;display:flex;align-items:center;gap:6px}
.count-chip{background:var(--accent-dim);color:var(--accent);font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;letter-spacing:0;text-transform:none}

/* photo list — vertical cards for mobile */
.photo-list{display:flex;flex-direction:column;gap:8px}
.photo-card{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;padding:10px;border:0.5px solid var(--border);transition:background var(--tr)}
.photo-thumb{width:52px;height:66px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.photo-info{flex:1;min-width:0}
.photo-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.photo-size{font-size:11px;color:var(--text2);margin-top:3px}
.photo-page{font-size:11px;color:var(--accent);margin-top:2px;font-weight:600}
.photo-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s;font-family:inherit}
.icon-btn:active{background:var(--accent-dim);color:var(--accent);transform:scale(0.92)}
.icon-btn:disabled{opacity:0.25;cursor:not-allowed;transform:none}
.del-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:all 0.15s}
.del-btn:active{background:rgba(255,80,80,0.12);color:#ff6060;transform:scale(0.92)}

.add-more-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px dashed var(--border);border-radius:14px;cursor:pointer;color:var(--text2);font-size:13px;transition:all 0.15s;background:transparent}
.add-more-row:active{background:var(--accent-dim)}

.options-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);transition:background var(--tr)}
.option-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid var(--border);gap:12px}
.option-row:last-child{border-bottom:none}
.option-label{font-size:14px;color:var(--text)}
.option-hint{font-size:11px;color:var(--text2);margin-top:2px}
select{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;cursor:pointer;transition:background var(--tr)}
.toggle{width:44px;height:26px;background:var(--tog);border-radius:13px;position:relative;cursor:pointer;transition:background 0.2s;border:none;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
.toggle.on::after{transform:translateX(18px)}

.bottom-bar{padding:12px 14px;padding-bottom:calc(12px + var(--safe-bottom));border-top:0.5px solid var(--border);background:var(--bbg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;bottom:0;transition:background var(--tr)}
.merge-btn{width:100%;padding:15px;background:var(--accent);color:var(--btn-text);border:none;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s;letter-spacing:0.3px}
.merge-btn:active{transform:scale(0.98);filter:brightness(0.88)}
.merge-btn:disabled{background:var(--surface2);color:var(--text2);cursor:not-allowed;transform:none;filter:none}
.progress-bar{width:100%;height:3px;background:var(--surface2);border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;width:0%}

.toast{position:fixed;bottom:calc(86px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;white-space:nowrap;opacity:0;transition:all 0.28s;border:0.5px solid var(--border);pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.compress-badge{display:inline-block;background:rgba(126,200,154,0.15);color:#7ec89a;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:600;vertical-align:middle}
[data-theme="dark"] .compress-badge,[data-theme="warm"] .compress-badge{color:#a0d8b8}
[data-theme="light"] .compress-badge{color:#3a8a5a;background:rgba(58,138,90,0.1)}

.empty-state{display:block}
.has-photos .empty-state{display:none}
.has-photos .photo-section{display:block}
.photo-section{display:none}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="app-icon">🐻</div>
    <div>
      <div class="app-title">照片轉 PDF</div>
      <div class="subtitle">選取照片，一鍵合併</div>
    </div>
  </div>
  <button class="theme-btn" onclick="openSheet()">
    <div class="theme-dot"></div>主題
  </button>
</header>

<main id="main">
  <div class="empty-state">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()">
      <span class="drop-icon">🖼️</span>
      <p class="drop-title">點這裡選取照片</p>
      <p class="drop-hint">支援 JPG、PNG，可一次選多張<br>大圖會自動壓縮</p>
      <button class="pick-btn" onclick="event.stopPropagation();document.getElementById('fi').click()">＋ 選取照片</button>
    </div>
  </div>

  <div class="photo-section">
    <p class="section-label">
      照片順序
      <span class="count-chip" id="countChip">0 張</span>
    </p>
    <div class="photo-list" id="photoList"></div>
  </div>

  <div class="photo-section">
    <p class="section-label">設定</p>
    <div class="options-card">
      <div class="option-row">
        <div><div class="option-label">頁面方向</div><div class="option-hint">每頁的顯示方向</div></div>
        <select id="orientation"><option value="auto">自動</option><option value="portrait">直式</option><option value="landscape">橫式</option></select>
      </div>
      <div class="option-row">
        <div><div class="option-label">紙張大小</div></div>
        <select id="pageSize"><option value="a4">A4</option><option value="letter">Letter</option></select>
      </div>
      <div class="option-row">
        <div><div class="option-label">保留白邊</div><div class="option-hint">頁面四周留空白</div></div>
        <button class="toggle on" id="marginToggle" onclick="this.classList.toggle('on')"></button>
      </div>
      <div class="option-row">
        <div><div class="option-label">自動壓縮 <span class="compress-badge">建議開啟</span></div><div class="option-hint">大圖自動縮小，加快速度</div></div>
        <button class="toggle on" id="compressToggle" onclick="this.classList.toggle('on')"></button>
      </div>
    </div>
  </div>
</main>

<div class="bottom-bar">
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <button class="merge-btn" id="mergeBtn" onclick="mergePDF()" disabled><span>先選取照片</span></button>
</div>

<div class="toast" id="toast"></div>
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="theme-sheet" id="themeSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">選擇主題</div>
  <div class="theme-options">
    <div class="theme-option" data-t="dark" onclick="setTheme('dark')">
      <div class="theme-preview"><span class="p1"></span><span class="p2"></span><span class="p3"></span></div>
      <div class="theme-name">午夜紫</div><div class="theme-check">✓</div>
    </div>
    <div class="theme-option" data-t="light" onclick="setTheme('light')">
      <div class="theme-preview"><span class="p1"></span><span class="p2"></span><span class="p3"></span></div>
      <div class="theme-name">薰衣草</div><div class="theme-check">✓</div>
    </div>
    <div class="theme-option" data-t="warm" onclick="setTheme('warm')">
      <div class="theme-preview"><span class="p1"></span><span class="p2"></span><span class="p3"></span></div>
      <div class="theme-name">焦糖夜</div><div class="theme-check">✓</div>
    </div>
    <div class="theme-option" data-t="sage" onclick="setTheme('sage')">
      <div class="theme-preview"><span class="p1"></span><span class="p2"></span><span class="p3"></span></div>
      <div class="theme-name">森林霧</div><div class="theme-check">✓</div>
    </div>
  </div>
</div>
<input type="file" id="fi" accept="image/*" multiple onchange="handleFiles(this.files)">

<script>
const{jsPDF}=window.jspdf;
let photos=[];

setTheme(localStorage.getItem('pdf-theme')||'dark',false);

function setTheme(t,save=true){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-option').forEach(el=>el.classList.toggle('active',el.dataset.t===t));
  if(save){localStorage.setItem('pdf-theme',t);closeSheet();}
}
function openSheet(){document.getElementById('overlay').classList.add('open');document.getElementById('themeSheet').classList.add('open')}
function closeSheet(){document.getElementById('overlay').classList.remove('open');document.getElementById('themeSheet').classList.remove('open')}

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});

function handleFiles(files){
  Array.from(files).filter(f=>f.type.startsWith('image/')).forEach(f=>photos.push({file:f,url:URL.createObjectURL(f),name:f.name,size:f.size}));
  render();
}

function formatSize(bytes){
  if(bytes>1024*1024)return(bytes/1024/1024).toFixed(1)+' MB';
  return Math.round(bytes/1024)+' KB';
}

function render(){
  document.getElementById('main').classList.toggle('has-photos',photos.length>0);
  document.getElementById('countChip').textContent=photos.length+' 張';
  const btn=document.getElementById('mergeBtn');
  btn.disabled=!photos.length;
  btn.querySelector('span').textContent=photos.length?`合併 ${photos.length} 張成 PDF`:'先選取照片';

  const list=document.getElementById('photoList');
  list.innerHTML='';
  photos.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='photo-card';
    card.innerHTML=`
      <img class="photo-thumb" src="${p.url}" loading="lazy">
      <div class="photo-info">
        <div class="photo-name">${p.name}</div>
        <div class="photo-size">${formatSize(p.size)}</div>
        <div class="photo-page">第 ${i+1} 頁</div>
      </div>
      <div class="photo-actions">
        <button class="icon-btn" onclick="move(${i},-1)" ${i===0?'disabled':''} title="上移">↑</button>
        <button class="icon-btn" onclick="move(${i},1)" ${i===photos.length-1?'disabled':''} title="下移">↓</button>
        <button class="del-btn" onclick="remove(${i})" title="移除">✕</button>
      </div>`;
    list.appendChild(card);
  });

  const addRow=document.createElement('div');
  addRow.className='add-more-row';
  addRow.onclick=()=>document.getElementById('fi').click();
  addRow.innerHTML='<span style="font-size:16px">＋</span> 新增更多照片';
  list.appendChild(addRow);
}

function move(i,dir){
  const j=i+dir;
  if(j<0||j>=photos.length)return;
  [photos[i],photos[j]]=[photos[j],photos[i]];
  render();
}

function remove(i){
  URL.revokeObjectURL(photos[i].url);
  photos.splice(i,1);
  render();
}

async function compressImage(file,maxPx=2400,quality=0.85){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{naturalWidth:w,naturalHeight:h}=img;
      if(w<=maxPx&&h<=maxPx){res(file);return;}
      const ratio=Math.min(maxPx/w,maxPx/h);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(w*ratio);
      canvas.height=Math.round(h*ratio);
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(blob=>res(blob||file),'image/jpeg',quality);
    };
    img.src=url;
  });
}

async function mergePDF(){
  if(!photos.length)return;
  const ori=document.getElementById('orientation').value;
  const ps=document.getElementById('pageSize').value;
  const mg=document.getElementById('marginToggle').classList.contains('on')?10:0;
  const doCompress=document.getElementById('compressToggle').classList.contains('on');
  const pb=document.getElementById('progressBar');
  const pf=document.getElementById('progressFill');
  const btn=document.getElementById('mergeBtn');
  pb.style.display='block';btn.disabled=true;btn.querySelector('span').textContent='處理中…';
  try{
    const pd=ps==='a4'?{w:210,h:297}:{w:215.9,h:279.4};
    let pdf=null;
    for(let i=0;i<photos.length;i++){
      pf.style.width=`${((i)/photos.length)*90}%`;
      btn.querySelector('span').textContent=`處理第 ${i+1}/${photos.length} 張…`;
      let src=photos[i].file;
      if(doCompress)src=await compressImage(src);
      const id=await loadImg(src);
      const dim=await getDim(id);
      const o=ori==='auto'?(dim.w>=dim.h?'landscape':'portrait'):ori;
      const pw=o==='landscape'?pd.h:pd.w,ph=o==='landscape'?pd.w:pd.h;
      if(!pdf)pdf=new jsPDF({orientation:o,unit:'mm',format:[pw,ph]});
      else pdf.addPage([pw,ph],o);
      const aw=pw-mg*2,ah=ph-mg*2;
      const r=Math.min(aw/dim.w,ah/dim.h);
      const dw=dim.w*r,dh=dim.h*r;
      pdf.addImage(id,'JPEG',mg+(aw-dw)/2,mg+(ah-dh)/2,dw,dh);
    }
    pf.style.width='100%';
    const d=new Date();
    const fname=`照片_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.pdf`;
    pdf.save(fname);
    showToast('✅ PDF 已儲存！');
  }catch(e){
    console.error(e);
    showToast('❌ 發生錯誤，請重試');
  }
  setTimeout(()=>{pb.style.display='none';pf.style.width='0%';btn.disabled=false;render();},1200);
}

function loadImg(f){
  return new Promise((res,rej)=>{
    if(typeof f.arrayBuffer==='function'||f instanceof Blob){
      const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f);
    } else res(f);
  });
}
function getDim(dataUrl){
  return new Promise(res=>{const i=new Image();i.onload=()=>res({w:i.naturalWidth,h:i.naturalHeight});i.src=dataUrl});
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
render();
</script>
</body>
